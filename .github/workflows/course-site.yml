name: Course site

on:
  push:
    branches:
      - main
    paths:
      - docs/course/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/course-site.yml
  pull_request:
    branches:
      - main
    paths:
      - docs/course/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/course-site.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: course-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build course site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.7"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install documentation dependencies
        run: uv sync --locked --group docs

      - name: Build and validate site
        run: uv run --no-sync mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy course site
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
