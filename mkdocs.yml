site_name: Phi
site_description: Build an Agent Harness from scratch in Python.
docs_dir: docs/course
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  font: false
  icon:
    logo: material/code-braces
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 课程首页: index.md
  - 课程信息:
      - 课程说明: syllabus.md
      - 课程安排: schedule.md
  - 课前准备:
      - 准备说明: prework/index.md
      - Async Lab:
          - 实验说明: prework/async-lab/index.md
          - "01 · 同步基线": prework/async-lab/01-sync-baseline.md
          - "02 · Coroutine": prework/async-lab/02-coroutines.md
          - "03 · Tasks": prework/async-lab/03-tasks.md
          - "04 · 结构化并发": prework/async-lab/04-structured-concurrency.md
          - "05 · 阻塞 Event Loop": prework/async-lab/05-blocking.md
          - "06 · Async Iterator": prework/async-lab/06-async-iteration.md
          - "07 · Timeout 与取消": prework/async-lab/07-cancellation.md
          - 准备度检查: prework/async-lab/readiness-check.md
  - Chapters:
      - 章节总览: chapters/index.md
      - "00 · 开场": chapters/00-orientation.md
      - "01 · Model 边界": chapters/01-model-boundary.md
      - "02 · Tool 边界": chapters/02-tool-boundary.md
      - "03 · Agent Loop": chapters/03-agent-loop.md
      - "04 · Context Engineering": chapters/04-context-engineering.md
      - "05 · Session 持久化与分支": chapters/05-sessions.md
      - "06 · Safety & Approval": chapters/06-safety-approval.md
      - "07 · MCP": chapters/07-mcp.md
      - "08 · Hooks & Skills": chapters/08-hooks-skills.md
      - "09 · Multi-agent": chapters/09-multi-agent.md
      - "10 · Events & Tracing": chapters/10-events-tracing.md
      - "11 · Hosts": chapters/11-hosts.md
      - "12 · 工业界 Agent 还差什么": chapters/12-industry-frontier.md
  - Appendix:
      - 环境准备: appendix/setup.md
      - 参考资料与设计来源: appendix/references.md

extra_css:
  - stylesheets/extra.css

copyright: Phi · Agent = Model + Harness
